<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم إلينا | Vertex</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #4b0082;
            --bg-color: #0d0d12;
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Triangles Background */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 100%);
        }

        .triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 35px solid rgba(138, 43, 226, 0.15);
            animation: floatup 15s linear infinite;
        }

        @keyframes floatup {
            0% { transform: translateY(110vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #b87aff, #6a11cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #a0a0b0;
            font-size: 1.1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #d0d0e0;
            margin-left: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            grid-column: 1 / -1;
            padding: 18px;
            background: linear-gradient(135deg, #8a2be2, #4b0082);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(138, 43, 226, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body dir="rtl">
    <div class="background-container" id="bg-container"></div>

    <div class="container">
        <div class="header">
            <h1>انضم إلينا</h1>
            <p>كن جزءًا من فريق Vertex.</p>
        </div>

        <form id="joinForm" class="form-grid">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="joinName" required>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="joinEmail" required>
            </div>

            <div class="form-group">
                <label>رقم الهاتف (اختياري)</label>
                <input type="tel" id="joinPhone">
            </div>

            <div class="form-group">
                <label>العمر</label>
                <input type="number" id="joinAge" required min="13" max="100">
            </div>

            <div class="form-group">
                <label>رابط LinkedIn (اختياري)</label>
                <input type="url" id="joinLinkedin">
            </div>

            <div class="form-group">
                <label>رابط GitHub (اختياري)</label>
                <input type="url" id="joinGithub">
            </div>

            <div class="form-group full-width">
                <label>تحدث عن نفسك</label>
                <textarea id="joinAbout" required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">إرسال الطلب</button>
        </form>

        <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>
    </div>

    <script>
        // Generate floating triangles
        const bgContainer = document.getElementById('bg-container');
        for (let i = 0; i < 30; i++) {
            const triangle = document.createElement('div');
            triangle.className = 'triangle';
            triangle.style.left = Math.random() * 100 + 'vw';
            triangle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            triangle.style.animationDelay = (Math.random() * 10) + 's';
            triangle.style.opacity = Math.random() * 0.5 + 0.1;
            const size = Math.random() * 20 + 10;
            triangle.style.borderLeftWidth = size + 'px';
            triangle.style.borderRightWidth = size + 'px';
            triangle.style.borderBottomWidth = (size * 1.7) + 'px';
            bgContainer.appendChild(triangle);
        }

        // Form Submission
        document.getElementById('joinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = '...';
            btn.disabled = true;

            const data = {
                name: document.getElementById('joinName').value,
                email: document.getElementById('joinEmail').value,
                phone: document.getElementById('joinPhone').value,
                age: document.getElementById('joinAge').value,
                linkedin: document.getElementById('joinLinkedin').value,
                github: document.getElementById('joinGithub').value,
                about: document.getElementById('joinAbout').value
            };

            fetch('https://europe-west1-vertex-ai-1618.cloudfunctions.net/createVertexContributor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(result => {
                alert('تم استلام الطلب!');
                document.getElementById('joinForm').reset();
            })
            .catch(error => {
                alert('حدث خطأ.');
                console.error(error);
            })
            .finally(() => {
                btn.textContent = originalText;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
