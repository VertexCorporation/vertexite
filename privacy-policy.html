<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vertex Privacy Policy</title>
  <script>
    (function() {
      const supportedLangs = ['tr', 'ar', 'az', 'de', 'es', 'fr', 'hi', 'id', 'it', 'ja', 'ko', 'nl', 'pt', 'ru', 'zh', 'en'];
      let userLang = navigator.language || navigator.userLanguage || 'en';
      userLang = userLang.split('-')[0];
      
      if (!supportedLangs.includes(userLang)) {
        userLang = 'en';
      }
      
      window.location.replace('/' + userLang + '/privacy-policy.html');
    })();
  </script>
</head>
<body>
  Redirecting to your language...
</body>
</html>
